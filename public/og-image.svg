<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Left accent bar -->
  <rect x="72" y="180" width="6" height="270" rx="3" fill="url(#accent)"/>

  <!-- Icon -->
  <rect x="88" y="172" width="80" height="80" rx="16" fill="#1e293b"/>
  <path d="M104 236V200l14 18 10-13 10 13 14-18v36" stroke="#f8fafc" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M148 224v11m-6-6 6 6 6-6" stroke="#60a5fa" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Title -->
  <text x="188" y="232" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="56" font-weight="700" fill="#f8fafc" letter-spacing="-1">Markdown Preview</text>
  <text x="188" y="296" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="56" font-weight="700" fill="url(#accent)" letter-spacing="-1">Online</text>

  <!-- Description -->
  <text x="88" y="368" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" fill="#94a3b8">Live editor · GFM · Mermaid diagrams · Syntax highlighting</text>
  <text x="88" y="410" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" fill="#94a3b8">Multiple tabs · Share via URL · No sign-in required</text>

  <!-- Feature pills -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" fill="#60a5fa">
    <rect x="88" y="448" width="136" height="38" rx="19" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="156" y="472" text-anchor="middle">React + Vite</text>

    <rect x="240" y="448" width="178" height="38" rx="19" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="329" y="472" text-anchor="middle">Tailwind CSS</text>

    <rect x="434" y="448" width="122" height="38" rx="19" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="495" y="472" text-anchor="middle">Mermaid</text>

    <rect x="572" y="448" width="166" height="38" rx="19" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="655" y="472" text-anchor="middle">CodeMirror 6</text>
  </g>

  <!-- URL -->
  <text x="88" y="572" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" fill="#475569">trongcong.github.io/markdown-preview-online</text>
</svg>
